l_english:

  # International Organization Localization

    # Empire of Japan - Greater East Asia Co-Prosperity Sphere

      # IO

        fnr_japan_greater_east_asia_io: "Greater East Asia Co-Prosperity Sphere"
        fnr_japan_greater_east_asia_io_name: "Greater East Asia Co-Prosperity Sphere"
        fnr_japan_greater_east_asia_io_desc: "Proclaimed as a brotherhood of Asian nations united against Western imperialism, the Greater East Asia Co-Prosperity Sphere is the instrument through which the Empire of Japan extends its influence across the continent. In principle, it promises liberation: freedom from European colonial rule, mutual economic development, and a new order in which Asian peoples determine their own fate under Japanese guidance. In practice, it is a hierarchy. Tokyo sets the terms. Member nations supply the resources, the labor, and the markets that fuel the imperial war machine. Those who join willingly receive the fiction of sovereignty. Those who resist receive the reality of occupation. Whether it is remembered as a genuine attempt to unite Asia or as a veil draped over conquest depends entirely on who is left to write the history."

        fnr_japan_greater_east_asia_io_list_who_tt: "TODO: list who TT"

      # Tooltips

        fnr_create_japan_greater_east_asia_io_tt: "Establish the [GetInternationalOrganizationType('fnr_japan_greater_east_asia_io').GetName] with us as its leader."
        fnr_add_japanese_clans_to_io_tt: "All Japanese clans and imperial families will be added to the [GetInternationalOrganizationType('fnr_japan_greater_east_asia_io').GetName]."

        fnr_japan_establish_choseon_tt: "Designate a son for the Kingdom of Chōsen and establishes it as an Imperial Protectorate."

      # Actions

        fnr_japan_integration_of_old_imperial_systems: "Integration of Old Imperial Systems"
        fnr_japan_integration_of_old_imperial_systems_desc: "The age of rival clans governing their domains as petty kingdoms within a kingdom has passed. The Emperor's authority now reaches every corner of [ShowRegionName('japan_region')], and the old feudal structures that once divided the realm serve no purpose but to weaken it. One by one, the remaining clans must be brought under direct imperial administration. Their lands will answer to the throne, their armies will serve the Empire, and their lords will find honored places within the new order, if they are wise enough to accept them."
        fnr_japan_integration_of_old_imperial_systems_tt: "A remaining clan within the #color_concept Greater East Asia Co-Prosperity Sphere#! will be integrated under direct imperial rule and their lands annexed into the Empire."

        fnr_japan_establish_chosen: "Establish the Kingdom of Chōsen"
        fnr_japan_establish_chosen_desc: "The Korean peninsula has long stood as a land of ancient tradition, yet its future now lies within our sphere. By establishing the Kingdom of Chōsen under our guidance, we shall bring order to its provinces and bind its people to the greater cause of East Asian unity beneath the banner of Nippon."

        fnr_japan_establish_manchuria: "Establish the Manchou Empire"
        fnr_japan_establish_manchuria_desc: "TODO"

        fnr_japan_establish_philippine: "Proclaim the Second Philippine Republic"
        fnr_japan_establish_philippine_desc: "TODO"

        fnr_japan_establish_china: "Reorganize the National Government of the Republic of China"
        fnr_japan_establish_china_desc: "TODO"

        fnr_japan_establish_inner_mongolia: "Reorganize the Inner Mongolian Region"
        fnr_japan_establish_inner_mongolia_desc: "TODO"

