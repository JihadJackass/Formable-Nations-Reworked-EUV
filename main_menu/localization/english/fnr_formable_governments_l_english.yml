  # Great Scotia
  fnr_GSCTL_nova_scotian_charter: "The Nova Scotian Charter"
  fnr_GSCTL_nova_scotian_charter_desc: "Scotland's future lies across the Atlantic. Through royal charter and organized settlement, we establish a New Scotland in the wilds of North America. The fisheries of Newfoundland, and the St. Lawrence valley shall become bastions of Scottish enterprise. Where England fumbles with scattered ventures, we bring Presbyterian discipline and Highland hardiness to the task of colonization."

  # Austrian-Hungarian Empire
  fnr_ASHNG_hungarian_compromise: "The Hungarian Compromise (Ausgleich)"
  fnr_ASHNG_hungarian_compromise_desc: "The Kingdom of Hungary maintains its ancient constitution and parliamentary traditions, with the Magyar nobility exercising considerable autonomy over internal affairs. While we share a monarch, military, and foreign policy, Hungary governs itself through its own parliament in Budapest. This delicate arrangement preserves Hungarian pride while maintaining imperial unity, though it grants the Magyar elite disproportionate influence over our affairs and limits our ability to govern as a centralized state."

  fnr_ASHNG_imperial_and_royal_administration: "Imperial and Royal Administration (Kaiserlich und Königlich)"
  fnr_ASHNG_imperial_and_royal_administration_desc: "Our empire is a patchwork of Germans, Hungarians, Czechs, Poles, Croats, Italians, Romanians, Slovaks, Slovenes, Ruthenians, and more—eleven major nationalities speaking eight languages and practicing four religions. Rather than force uniformity, we embrace administrative flexibility. Each crown land maintains its traditional institutions, laws, and languages. This pragmatic tolerance prevents nationalist rebellion but creates a byzantine bureaucracy where every decision requires negotiation between a dozen competing interests."

  # Sweden-Norway Unique Reforms

  # Major Sweden
  swedish_administration_major: "Administration of the Swedish Crown"
  swedish_administration_major_desc: "The unification of Sweden-Norway required significant concessions to the nobility of both kingdoms. However, by codifying these privileges and tying noble support to the Crown's interests, we can leverage their desire to maintain these exceptional rights. In exchange for guaranteeing noble privileges, we secure their loyalty and resources for state purposes, strengthening royal authority."

  # Minor Norway
  norwegian_administration_minor: "Administration of the Norwegian Crown"
  norwegian_administration_minor_desc: "The union with Sweden has elevated Norway's nobility to a position of unprecedented influence within the joint realm. While granting these privileges strains our autonomy, the Norwegian Crown can leverage noble ambition to strengthen our position. By guaranteeing their status and rights, we secure noble support for royal initiatives and ensure Norwegian interests are represented at the highest levels of the Union."

  # Minor Sweden
  swedish_administration_minor: "Administration of the Swedish Crown"
  swedish_administration_minor_desc: "The unification of Sweden-Norway required significant concessions to the nobility of both kingdoms. However, by codifying these privileges and tying noble support to the Crown's interests, we can leverage their desire to maintain these exceptional rights. In exchange for guaranteeing noble privileges, we secure their loyalty and resources for state purposes, strengthening royal authority."

  # Minor Norway
  norwegian_administration_major: "Administration of the Norwegian Crown"
  norwegian_administration_major_desc: "The union with Sweden has elevated Norway's nobility to a position of unprecedented influence within the joint realm. While granting these privileges strains our autonomy, the Norwegian Crown can leverage noble ambition to strengthen our position. By guaranteeing their status and rights, we secure noble support for royal initiatives and ensure Norwegian interests are represented at the highest levels of the Union."
