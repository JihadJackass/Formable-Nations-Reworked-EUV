    # Poland-Hungary
    PLHUN: "Poland-Hungary"
    PLHUN_ADJ: "Polish-Hungarian"
    PLHUN_desc: "The Poland-Hungary union was a personal union that occurred twice, where one monarch ruled both kingdoms without merging their institutions. The first was from 1370 to 1382 under Louis I of Hungary, and the second from 1440 to 1444 under Władysław III of Poland. Both unions were temporary and ended due to succession issues or the death of the monarch."

