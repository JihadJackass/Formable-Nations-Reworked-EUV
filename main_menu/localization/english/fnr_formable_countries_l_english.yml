  # vanilla formables

    # Russian Tsardom
    RUS: "Tsardom of Russia"
    RUS_ADJ: "Russian"

  ########################
  # HISTORICAL FORMABLES #
  ########################

    # Rhineland - Alternate flags coded by Tawani
    RHLND: "Rhineland"
    RHLND_ADJ: "Rhenish"
    RHLND_desc: "The Rhine has enriched countless masters but served none exclusively. Prince-bishoprics, free cities, and petty duchies fragmented Europe's greatest trade artery for centuries. Through conquest, we unite the Rhineland under single authority. The tolls, trade, and strategic position once divided among hundreds now serve one realm. France cannot ignore us, German princes must negotiate with us, and the Low Countries need our cooperation. We control the Rhine. We control the wealth."
    RHLND_ducal: "United Duchies"
    RHLND_ducal_ADJ: "Ducal"
    RHLND_comital: "United Counties"
    RHLND_comital_ADJ: "Comital"
    RHLND_republic: "United Republics"
    RHLND_republic_ADJ: "Republican"

    # Balochistan
    BALCH: "Balochistan"
    BALCH_ADJ: "Balochi"
    BALCH_desc: "Balochistan is both a region and an ethnic group that historically has a distinct identity, with a significant independence movement demanding autonomy or full independence from Pakistan. It is a land of rich natural resources, but the region is also the poorest and largest province in modern-day Pakistan."
    
    # Polabia
    POLBA: "Polabia"
    POLBA_ADJ: "Polabian"
    POLBA_desc: "The Polabians (German: Polaben; Latin: Polabi) were a constituent Lechitic tribe of the Obotrites who lived between the Trave and the Elbe. The main settlement of the Polabians was Racisburg (modern Ratzeburg), named after their Prince Ratibor."

    # Greater Sorbia
    GSORB: "Greater Sorbia"
    GSORB_ADJ: "Greater Sorbian"
    GSORB_desc: "Long overshadowed by the great powers that surrounded them, the Sorbs endured as a resilient people, keeping their language and faith alive amid centuries of foreign rule. The unification of the Sorbian lands marks the rebirth of a nation thought lost to history which cries a beacon of Slavic endurance and identity. A Greater Sorbia rises determined to reclaim a great legacy and secure its borders."

    # Baden-Alsace
    BDALS: "Baden-Alsace"
    BDALS_ADJ: "Baden-Alsatian"
    BDALS_desc: "The Rhine divides lands that share language, culture, and commerce. Through conquest, we unite Baden and Alsace under one banner, correcting the political borders that separated kindred peoples. Our realm commands the vital crossroads between France and Germany, profiting from Rhine trade while defending our independence. Let neither Paris nor Vienna control our destiny."

    # Zapadoslavia
    ZPDSL: "Zapadoslavia"
    ZPDSL_ADJ: "Zapadoslavian"
    ZPDSL_desc: "Poles, Czechs, Slovaks, and Sorbs share language, culture, and centuries of struggle against Germanic and Russian expansion. Through conquest, we unite the West Slavic peoples into Zapadoslavia. Our strategic position in Central Europe makes us the bridge between East and West, strong enough to resist foreign domination. Where our ancestors fell divided, we stand united. The West Slavs have awakened."

    # Sorbic Kingdom
    KSORB: "Sorbic Kingdom"
    KSORB_ALT: "Sorbia"
    KSORB_ADJ: "Sorbic"
    KSORB_desc: "The Sorbic Kingdom is a more centralized version of a unified Sorbian realm which contends with neighboring hostile powers and a diversive region of languages and religions."  

    # Kingdom of Hanover
    KOFHN: "Kingdom of Hanover"
    KOFHN_ADJ: "Hanoveran"
    KOFHN_desc: "The Kingdom of Hanover was a German state that existed from 1814 to 1866, founded at the Congress of Vienna. It was ruled by the House of Hanover and was in personal union with the United Kingdom until 1837, when the constitutions of the two countries diverged and the British monarch was no longer the King of Hanover. After being a member of the German Confederation, it lost its independence in the Austro-Prussian War of 1866 and was annexed by Prussia."

    # Polynesia
    POLNE: "Polynesia"
    POLNE_ADJ: "Polynesian"
    POLNE_desc: "Polynesia is a subregion of Oceania consisting of over 1,000 islands scattered across the central and southern Pacific Ocean, forming a large triangle with its corners at the Hawaiian Islands, New Zealand, and Easter Island. The region's indigenous people, Polynesians, share common linguistic and cultural traits, and its independent nations include New Zealand, Samoa, and Tuvalu."

    # Hawaii
    HAWAI: "Hawai'i"
    HAWAI_ADJ: "Hawaiian"
    HAWAI_desc: "the historic Kingdom of Hawaii, a sovereign nation from 1795 to 1893 that was annexed by the United States, and the modern Nation of Hawaii, an independence movement and organization that advocates for Hawaiian sovereignty today. The historic Kingdom was a unified, self-governing country with a sophisticated culture and organized social system before its overthrow and annexation."

    # Yugoslavia
    YGOSL: "Yugoslavia"
    YGOSL_ADJ: "Yugoslavian"
    YGOSL_desc: "Yugoslavia was a federal state in Central and Southeast Europe that existed from 1918 to 1992, meaning 'Land of the South Slavs'. It was a multi-ethnic and multi-religious federation initially called the Kingdom of Serbs, Croats, and Slovenes, which later became the Socialist Federal Republic of Yugoslavia after World War II. The country's complex identity, comprised of six republics, two autonomous provinces, and various ethnic groups, ultimately led to its dissolution amid rising nationalism in the early 1990s"

    # Japan
    JAPAN: "Japan"
    JAPAN_ADJ: "Japanese"
    JAPAN_desc: "Japan is an East Asian island nation with a unique blend of ancient tradition and advanced technology. It is an archipelago of four main islands—Hokkaido, Honshu, Shikoku, and Kyushu—and thousands of smaller ones, with a government that is a parliamentary constitutional monarchy led by an emperor and prime minister. Characterized by mountainous terrain, Japan's population is concentrated along coastal plains, with Tokyo as its capital and largest city."

    # Angevin Empire
    AGEVN: "Angevin Empire"
    AGEVN_ADJ: "Angevin"
    AGEVN_desc: "The Angevin Empire was a collection of territories ruled by the House of Plantagenet from 1154 to 1216, encompassing England and large parts of France, including Normandy, Anjou, and Aquitaine. It was a powerful but loosely connected 'composite monarchy' established by Henry II and his successors, Richard I and John."

    # Baltic States
    BLTST: "Baltic States"
    BLTST_ADJ: "Baltic"
    BLTST_desc: "The Baltic states—Estonia, Latvia, and Lithuania—are nations in northeastern Europe on the eastern coast of the Baltic Sea, characterized by a flat landscape of forests, lakes, and rivers. Historically, they were independent after World War I, occupied by the Soviet Union, and regained sovereignty in 1991"

    # Alsace-Lorraine
    ALSLO: "Alsace-Lorraine"
    ALSLO_ADJ: "Alsatian-Lorrainer"
    ALSLO_desc: "Alsace-Lorraine is a historical region in northeastern France, not a modern nation, known for its complex history of shifting between French and German control and its unique blend of cultures. The area was ceded by France to Germany in 1871 after the Franco-Prussian War and returned to France in 1919 after World War I. It has since been re-incorporated into France, now as part of the Grand Est region, but retains a special legal status and a distinct cultural identity shaped by its Franco-Germanic heritage."

    # Aquitaine
    AQUIT: "Kingdom of Aquitaine"
    AQUIT_ADJ: "Aquitanian"
    AQUIT_desc: "Aquitaine is a historical region of southwestern France and a former administrative region - With the right connections and some effective warfare we can establish the Kingdom of Aquitaine as it's own independent nation directly opposing French Unification."

    # Rhine Confederation
    RCONF: "Confederation of the Rhine"
    RCONF_ADJ: "Rhenish"
    RCONF_desc: "The Confederation of the Rhine was a German client state confederation of the First French Empire from 1806 to 1813, established by Napoleon Bonaparte after his victory at Austerlitz. It included most of the German states except Austria and Prussia, serving as a buffer against French eastern borders and dissolving after Napoleon's defeat in the War of the Sixth Coalition. Though a confederation, it was not a unified state but a loose alliance under Napoleon's 'Protector' title, which allowed France to dominate Central Europe and utilize the confederation's resources for its wars."

    # Belarus
    BLRUS: "Belarus"
    BLRUS_ADJ: "Belarusian"
    BLRUS_desc: "Belarus is a landlocked country in Eastern Europe with a flat, forested landscape, bordered by Russia, Ukraine, Poland, Lithuania, and Latvia. Its capital is Minsk, and it has a population of about 9.1 million people. Historically part of the Soviet Union, it now operates as an authoritarian state with a strong government-controlled economy and significant restrictions on civil liberties."

    # Belgium
    BLGUM: "Belgium"
    BLGUM_ADJ: "Belgian"
    BLGUM_desc: "Belgium is a federal parliamentary constitutional monarchy in Western Europe, bordered by France, Germany, Luxembourg, and the Netherlands. It is known for its complex federal structure based on linguistic regions (Flemish, Walloon, and Brussels-Capital), its official languages of Dutch, French, and German, and its capital, Brussels."

    # Papal States Dominates HRE
    PAP_HRE_EMPIRE_1: "Imperium Christianum"
    PAP_HRE_EMPIRE_1_ADJ: "Papal"

    PAP_HRE_EMPIRE_2: "Holy Empire"
    PAP_HRE_EMPIRE_2_ADJ: "Papal"

    PAP_HRE_EMPIRE_3: "Sacred Empire"
    PAP_HRE_EMPIRE_3_ADJ: "Papal"

    PAP_HRE_EMPIRE_4: "Universal Monarchy"
    PAP_HRE_EMPIRE_4_ADJ: "Papal"

    PAP_HRE_EMPIRE_5: "Empire of Christendom"
    PAP_HRE_EMPIRE_5_ADJ: "Papal"

    PAP_HRE_EMPIRE_6: "The Dominion of St. Peter"
    PAP_HRE_EMPIRE_6_ADJ: "Papal"


    # Netherlands
    NED_UP: "United Provinces"
    NED_UP_ADJ: "United Provinces"

    NED_DR: "Dutch Republic"
    NED_DR_ADJ: "Dutch"

    # Benelux
    BNLUX: "Benelux"
    BNLUX_ADJ: "Beneluxian"
    BNLUX_desc: "Benelux refers to the political and economic union of three neighboring Western European countries: Belgium, the Netherlands, and Luxembourg. The name is a portmanteau of the first two letters of each country's name. This union, which started as a customs union in 1948, fosters cooperation on a wide range of issues including the free movement of people, goods, capital, and services."

    # Bremen-Verden
    BMNVD: "Bremen-Verden"
    BMNVD_ADJ: "Bremen-Verdian"
    BMNVD_desc: "Bremen-Verden, formally the Duchies of Bremen and Verden, were two territories and immediate fiefs of the Holy Roman Empire, which emerged and gained imperial immediacy in 1180."

    # Bulgarian Empire
    BLGEM: "Bulgarian Empire"
    BLGEM_ADJ: "Bulgarian"
    BLGEM_desc: "Bulgaria was a powerful kingdom in Southeastern Europe, often competing with the Byzantine Empire. The First Bulgarian Empire (681–1018 AD) originated from the Bulgars settling south of the Danube and grew to become a major power, culturally and politically, especially under rulers like Boris I and Simeon the Great. The Second Bulgarian Empire arose after a period of Byzantine rule, beginning in 1185 and lasting until 1396."

    # British Empire
    BISHE: "British Empire"
    BISHE_ADJ: "British"
    BISHE_desc: "The British Empire was a vast global territory that began in the 16th century, reaching its peak in the 19th and early 20th centuries as the largest empire in history, ruling over 400 million people and covering 24% of the world's land area. It consisted of dominions, colonies, protectorates, and other territories ruled by the United Kingdom, with its expansion fueled by economic, nationalist, and exploration-driven motives."

    # Cisalpina
    CSPNA: "Cisalpina"
    CSPNA_ADJ: "Cisalpinan"
    CSPNA_desc: "The Cisalpine Republic was a sister republic or a client state of France in Northern Italy that existed from 1797 to 1799, with a second version until 1802. "

    # Commonwealth of England
    ENGCM: "Commonwealth of England"
    ENGCM_ADJ: "English"
    ENGCM_desc: "The Commonwealth of England refers to the historical period from 1649 to 1660 when England was a republic without a monarch, established after the English Civil War. It was a political entity where the country was governed by a Lord Protector and Parliament, with the head of state in this case being Oliver Cromwell."

    # Czechoslovakia
    CZSLO: "Czechoslovakia"
    CZSLO_ADJ: "Czechoslovak"
    CZSLO_desc: "Czechoslovakia is made up of the historical lands of Bohemia, Moravia, and Slovakia which allowed it to became a democratic and prosperous nation within the constantly hostile regions of Europe."

    # Ducal Prussia
    DCLPR: "Ducal Prussia"
    DCLPR_ADJ: "Prussian"
    DCLPR_desc: "The Duchy of Prussia or Ducal Prussia was a duchy in the region of Prussia established as a result of secularization of the Monastic Prussia, the territory that remained under the control of the State of the Teutonic Order until the Protestant Reformation in 1525."

    # # Brandenburg-Prussia - Historical
    BNDPR: "Brandenburg-Prussia"
    BNDPR_ADJ: "Brandenburg-Prussian"
    BNDPR_desc: "Brandenburg-Prussia (1618-1701) was a personal union of the Electorate of Brandenburg and the Duchy of Prussia, ruled by the Hohenzollern dynasty, forming the core of what would become the Kingdom of Prussia and later the German Empire. Key developments included the devastating Thirty Years' War, the rise of the 'Great Elector' Frederick William who built a strong army and expanded territories (like Pomerania), and the eventual elevation of the state to a kingdom under Frederick I in 1701, solidifying its power in central Europe."

    # Ukraine
    UKRNE: "Ukraine"
    UKRNE_ADJ: "Ukranian"
    UKRNE_desc: "Ukraine is a large, historically rich Eastern European nation known for its resilience, fertile lands (often called the 'Breadbasket of Europe')\n\nUkraine is located in South-Eastern Europe and shares borders with several countries, including Russia to the east and the Black Sea to the south. The terrain is mostly flat plains (steppes), with the Carpathian Mountains in the west. It possesses rich natural resources, particularly extensive fertile 'black soil' (chernozem) and significant mineral deposits, including iron, coal, and manganese.\n\nWe care establish what is essentially a modern national state under Kyivan guidance with the right conquests."

    # Donetsk PR
    DNTPR: "Donetsk People's Republic"
    DNTPR_ADJ: "Donetsk"
    DNTPR_desc: "The Donetsk People's Republic (DPR) is a self-proclaimed, now Russian-annexed state in eastern Ukraine's Donbass region, established in 2014 amid political turmoil. It is a republic of Russia with its capital in Donetsk, established on a territory that was illegally annexed in September 2022. Prior to annexation, it existed as a separatist entity with limited international recognition. Its ideology has been shaped by a mixture of Russian ultranationalism, Orthodox fundamentalism, and Soviet-era ideals."

    # Luhansk PR
    LUHPR: "Luhansk People's Republic"
    LUHPR_ADJ: "Luhansk"
    LUHPR_desc: "The Luhansk People's Republic (LPR) is a breakaway state in eastern Ukraine, located in the Donbas region, that was proclaimed in 2014 and effectively annexed by Russia in 2022. It is a disputed territory, with nearly all UN member states considering it a part of Ukraine. The LPR was formed by Russian-backed separatists following the Euromaidan revolution and is heavily supported by Russia, but it has received limited international recognition"

    # Illyria
    ILYRA: "Illyria"
    ILYRA_ADJ: "Illyrian"
    ILYRA_desc: "Illyria was an ancient region on the western Balkan Peninsula, along the Adriatic Sea, that was home to various tribes collectively known as the Illyrians. It included territories in modern-day Albania, Montenegro, and Croatia, and was later expanded to become the Roman province of Illyricum, which stretched from the Adriatic to the Danube. The name has also been used in later historical contexts and in fiction."

    # Eastern Roman Empire
    EASRE: "Eastern Roman Empire"
    EASRE_ADJ: "Roman"
    EASRE_desc: "The Eastern Roman Empire, also known as the Byzantine Empire, was the continuation of the Roman Empire in its eastern provinces, with its capital at Constantinople (modern-day Istanbul). Its citizens called themselves 'Romans' and the empire was a powerful hub of Eastern Orthodox Christianity, Greek culture, and classical learning that influenced the development of art, law, and government across Europe and the Middle East for over a thousand years after the Western Roman Empire's fall."

    # Western Roman Empire
    WESRE: "Western Roman Empire"
    WESRE_ADJ: "Roman"
    WESRE_desc: "The Western Roman Empire was the western half of the Roman Empire that was administered separately from the East after a formal division in 395 AD. It was characterized by a capital that moved from Mediolanum to Ravenna, encompassing provinces like Italy, Gaul, and Hispania, but was weakened by economic instability, political corruption, and frequent invasions from groups like the Goths, Burgundians, and Suebi."

    # Emilia-Romagna
    EMLRO: "Emilia-Romagna"
    EMLRO_ADJ: "Emilia-Romagnan"
    EMLRO_desc: "Tmilia-Romagna is an Italian region known for its rich food, history, and strong economy. It is often called the 'Food Valley' due to its famous agricultural products like Parmigiano Reggiano, Parma ham, and balsamic vinegar, and it's a leader in food innovation."

    # European Union
    EUROP: "European Union"
    EUROP_ADJ: "European"
    EUROP_desc: "The unification of Europe under a single banner. Born from centuries of rivalry, war, and fragile peace, the European Union stands as a beacon of cooperation and shared destiny. No longer divided by borders and crowns, Europe now moves with one voice, wielding unparalleled economic and military might."

    # French Empire
    FNCEM: "French Empire"
    FNCEM_ADJ: "French"
    FNCEM_desc: "There are two disctint moments in history which held a dominant French position, these being the First French colonial empire (16th-19th century) and the Napoleonic Empire (1804-1815). The colonial empire was the second-largest in the world at its peak and included vast territories in North America, the Caribbean, and India before most of it was lost. The Napoleonic Empire, by contrast, was a European empire centered on France and established by Napoleon Bonaparte, which conquered much of continental Europe"

    # North German Confederation
    NGCFD: "North German Confederation"
    NGCFD_ADJ: "North German"
    NGCFD_desc: "A federal state dominated by Prussia that united the German states north of the Main River, excluding Austria. Formed after Prussia's victory in the Austro-Prussian War, it served as the foundation for German unification, featuring a federal structure with a Prussian-controlled military and foreign policy. Led by Otto von Bismarck, it preceded the German Empire by four years."

    # Baden-Wurttemberg
    BDWTB: "Baden-Wurttemberg"
    BDWTB_ADJ: "Baden-Württembergisch"
    BDWTB_desc: "A unified southwestern German state formed by merging Baden and Württemberg, creating a powerful Swabian confederation. This union combines the industrial prowess and liberal traditions of Baden with Württemberg's administrative efficiency, establishing a 'third way' between Prussian militarism and Bavarian conservatism. A regional powerhouse asserting southwestern German autonomy and influence."

    # Sassanids
    SSNID: "Sassanids"
    SSNID_ADJ: "Sassanids"
    SSNID_desc: "An Iranian nationalist movement seeking to restore the glory of the last pre-Islamic Iranian empire. Led by Persia, it revives Zoroastrianism as the state religion, reclaims ancient territories from Mesopotamia to Central Asia, and rejects centuries of Arab and Turkic influence. This neo-Sassanid state embraces the legacy of Shapur, Khosrow, and the ancient Kings of Kings, restoring Persian language, culture, and imperial administration."

    # Magna Graecia (Greek Naples)
    MGGCA: "Magna Graecia"
    MGGCA_ADJ: "Magna Graecian"
    MGGCA_desc: "A cultural revival movement led by Naples or a southern Italian power seeking to restore the ancient Greek heritage of Southern Italy. Embracing the legacy of the Greek colonies that once flourished from Calabria to Sicily, this state promotes Hellenization, Greek language revival, and Byzantine-inspired governance to reclaim the region's identity as 'Great Greece' - the western jewel of Hellenic civilization."

    # South German Confederation
    SGCFD: "South German Confederation"
    SGCFD_ADJ: "South German"
    SGCFD_desc: "A Catholic-dominated federation of southern German states (Bavaria, Württemberg, Baden, and southern Hesse) formed as a counterweight to Prussian influence in the north. Led by either Austria or Bavaria, it represents an alternate path to German unity that preserves Catholic interests and resists Protestant Prussian hegemony. This confederation maintains closer ties to the Habsburg sphere while defending southern German autonomy."

    # German Empire
    GMNEM: "German Empire"
    GMNEM_ADJ: "German"
    GMNEM_desc: "The German Empire was a German state that existed from 1871 to 1918, formed from the unification of German states led by Prussia. It was a federal monarchy, dominated by Prussia, which provided the hereditary emperor and a significant portion of the population and territory. The empire had a bicameral parliament (the Reichstag and the Bundesrat) but real power was concentrated in the emperor and his chancellor, Otto von Bismarck, especially under his leadership.\n\nThe new constitution came into force on 16 April, changing the name of the federal state to the German Empire and introducing the title of German Emperor for Wilhelm I, King of Prussia from the House of Hohenzollern. Berlin remained its capital, and Otto von Bismarck, Minister President of Prussia, became chancellor, the head of government. After 1850, the states of Germany had rapidly become industrialized."

    # German Reich
    GMNRE: "German Reich"
    GMNRE_ADJ: "German"
    GMNRE_desc: "The German Reich was the official name for the German nation-state from 1871 to 1945, encompassing three distinct political systems: the German Empire (1871-1918), the Weimar Republic (1919-1933), and Nazi Germany (1933-1945). The term 'German Reich' is most frequently associated with the Third Reich, or Nazi Germany, which was a totalitarian dictatorship under Adolf Hitler and the Nazi Party"

    # Greater German Reich
    GTRGM: "Greater German Reich"
    GTRGM_ADJ: "German"
    GTRGM_desc: "he Greater German Reich was the official name for Nazi Germany from 1938 onwards, styled as the Greater Germanic Reich of the German Nation. This totalitarian state, led by Adolf Hitler, sought to expand its territorial control across Europe, annexing territories like Austria and the Sudetenland. The state's ideology was built on Nazi principles of racial superiority, aiming to establish dominance in Eastern Europe."

    # Hanseatic League
    #HANSA: "Hanseatic League"
    HNSLG: "Hanseatic League"
    HNSLG_ADJ: "Hanseatic"
    HNSLG_desc: "The Hanseatic League was a powerful medieval commercial and defensive alliance of merchant guilds and market towns in Northern Europe, which controlled trade in the Baltic and North Seas from the 13th to the 17th centuries."

    # Hesse-Nassau
    HESNA: "Hesse-Nassau"
    HESNA_ADJ: "Hessean"
    HESNA_desc: "Hesse-Nassau was created as a consequence of the Austro-Prussian War of 1866 by combining the previously independent Hesse-Kassel (or Hesse-Cassel), the Duchy of Nassau, the Free City of Frankfurt, areas gained from the Kingdom of Bavaria, and areas gained from the Grand Duchy of Hesse (including part of the former Landgraviate of Hesse-Homburg from Hesse-Darmstadt)."

    # Italian Empire
    ITNEM: "Italian Empire"
    ITNEM_ADJ: "Italian"
    ITNEM_desc: "The Italian Empire was a colonial empire that existed between 1882 and 1960, encompassing territories in Africa, the Mediterranean, and China that were controlled by the Kingdom of Italy. At its peak (1936–1941), it included colonies in North and East Africa like Libya, Eritrea, Somalia, and Ethiopia (Africa Orientale Italiana), as well as the Dodecanese Islands, and a protectorate in Albania. Its existence was tied to the expansionist policies of the Italian government, particularly the Fascist regime under Benito Mussolini."

    # Kalmar Union
    KLMUN: "Kalmar Union"
    KLMUN_ADJ: "Kalmar"
    KLMUN_desc: "The Kalmar Union (1397–1523) was a personal union that united the three sovereign kingdoms of Denmark, Sweden (including most of present-day Finland), and Norway (including Iceland, Greenland, the Faroe Islands, Orkney, and Shetland) under a single monarch. It was not a single, unified nation-state, but rather an arrangement where each country legally retained its separate laws and governing councils, while sharing a common ruler and a unified foreign policy."

    # Latin Empire
    LTNEM: "Latin Empire"
    LTNEM_ADJ: "Latin"
    LTNEM_desc: "The Latin Empire was a feudal Crusader state established in 1204 by leaders of the Fourth Crusade on lands conquered from the Byzantine Empire, intended to replace it with a Catholic ruler. Based in Constantinople, it was a short-lived state ruled by a Catholic emperor, like Baldwin I, who was crowned in 1204. The empire gradually weakened due to internal and external conflicts, ultimately falling when the Byzantines recaptured Constantinople in 1261."

    # Lombardy
    LMBDY: "Lombardy"
    LMBDY_ADJ: "Lombardian"
    LMBDY_desc: "Lombardy is a leading industrial and cultural region in northern Italy with a population and economy comparable to a small nation. It is Italy's most populated region, with a diverse landscape that includes the Alps and lakes like Como and Garda, and is a major economic hub in Europe known for its manufacturing, finance, and fashion industries centered in the Italian region."

    # Lombardy-Venetia
    LMBYV: "Lombardy–Venetia"
    LMBYV_ADJ: "Lombardo-Venetian"
    LMBYV_desc: "The Kingdom of Lombardy–Venetia was a crown land of the Austrian Empire from 1815 to 1866, encompassing the regions of Lombardy and Venetia in northern Italy. Established by the Congress of Vienna after the fall of Napoleon's Kingdom of Italy, it was a monarchy ruled by the Austrian Habsburg emperors, with a capital that moved from Milan to Venice during its existence. The kingdom dissolved when Venice was annexed by the Kingdom of Italy in 1866, following the Austro-Prussian War."

    # Lower Saxony
    LWSXY: "Lower Saxony"
    LWSXY_ADJ: "Lower Saxon"
    LWSXY_desc: "Lower Saxony is a German federal state in northwestern Germany, known for its diverse landscapes ranging from the North Sea coast to the Harz mountains. It is the second-largest German state by area and the fourth-largest by population, with a history shaped by regions like Hanover and significant industrial and agricultural sectors."

    # Malta
    MALTA: "Malta"
    MALTA_ADJ: "Maltese"
    MALTA_desc: "Malta is a small, densely populated island nation in the central Mediterranean Sea, consisting of an archipelago that includes the islands of Malta, Gozo, and Comino. Historically significant due to its strategic location, it has been shaped by centuries of foreign rule, resulting in a unique culture that blends Arab, Sicilian, Italian, and French influences. It has a rocky, low-lying landscape with a rugged coastline, no rivers or mountains, and a strong economy that includes financial services, tourism, and a forward-looking approach."

    # Mercia
    MRCIA: "Mercia"
    MRCIA_ADJ: "Mercian"
    MRCIA_desc: "Mercia was a powerful Anglo-Saxon kingdom in the Midlands of England, dominant from the 7th to 9th centuries. Its name comes from the Old English for 'people of the marches' or 'boundaries,' reflecting its position bordering the Celtic tribes to the west. The kingdom was known for its power during the Heptarchy, featuring influential rulers like Penda and Offa, who built Offa's Dyke to mark the border with Wales"

    # Nazi Germany
    NAZIG: "Nazi Germany"
    NAZIG_ADJ: "German"
    NAZIG_desc: "Nazi Germany was the German state from 1933 to 1945, ruled by Adolf Hitler and the Nazi Party, transforming it into a totalitarian dictatorship. It is also known as the Third Reich, a term that implied succession from the Holy Roman Empire and German Empire. Key features included extreme nationalism, virulent antisemitism, expansionist foreign policy, and the persecution of Jews and other minority groups, which ultimately led to World War II"

    # Russian Empire
    RUSEM: "Russian Empire"
    RUSEM_ADJ: "Russian"
    RUSEM_desc: "The Russian Empire was a vast, autocratic state spanning parts of Europe and Asia from 1721 to 1917, characterized by an absolute monarch (the Tsar), a large and mostly impoverished population of serfs, and significant territorial expansion across Siberia, Central Asia, and into Alaska. Despite some modernization, it remained a politically, socially, and economically backward society compared to Western Europe until its collapse during the February Revolution of 1917."

    # Russian Federation
    RUFED: "Russian Federation"
    RUFED_ADJ: "Russian"
    RUFED_desc: "The Russian Federation is the largest country in the world by area, spanning Eastern Europe and Northern Asia across 11 time zones. It is a federal semi-presidential republic with a population of over 140 million and its capital is Moscow. Russia has vast natural resources, including mineral and energy reserves, and a highly urbanized population, with a history spanning from the Rurik Dynasty to the modern Russian Federation."

    # Serbian Empire
    SRBEM: "Serbian Empire"
    SRBEM_ADJ: "Serbian"
    SRBEM_desc: "From the mountains of Montenegro to the plains of Vojvodina, the dream of a united Serbian realm has long burned in the hearts of its people. A reborn Greater Serbia seeks to gather all Serbs under one banner, restoring the might once glimpsed in the medieval empire of Stefan Dušan. Yet such unity comes at a cost with the crown of empire comes the challenge of governing many lands, tongues, and faiths. Whether forged through liberation or conquest, this Serbian Empire will stand ready to shape the destiny of the Balkans."

    # Soviet Union
    SOVET: "Soviet Union"
    SOVET_ADJ: "Soviet"
    SOVET_desc: "he Soviet Union, officially the Union of Soviet Socialist Republics (USSR), was a transcontinental country in Eurasia from 1922 to 1991, known for its vast size and as the world's first socialist state. It was nominally a federal union of 15 Soviet Socialist Republics but was highly centralized in practice, with its government and economy controlled by the Communist Party in Moscow. The Soviet Union was characterized by a command economy and a single-party political system that aimed to establish communism, yet failed in the attempt leading to the collapse of the Union."

    # Sweden-Norway
    SDNNW: "Sweden-Norway"
    SDNNW_ADJ: "Nordic"
    SDNNW_desc: "The term 'Sweden-Norway' most accurately describes the former United Kingdoms of Sweden and Norway, a personal union from 1814 to 1905, but also refers to the modern countries of Sweden and Norway which are distinct nations with shared history and culture, though with different geographies."

    # Swedish Empire
    SWDEM: "Swedish Empire"
    SWDEM_ADJ: "Swedish"
    SWDEM_desc: "The Swedish Empire was a period in Swedish history, roughly from 1611 to 1721, when Sweden was a major European power controlling territory around the Baltic Sea. It was known for its powerful military, and during this time, Sweden expanded its dominion to include territories in modern-day Germany, Russia, and Ukraine, as well as overseas colonies in North America. The empire's power declined after the Great Northern War, which ended in 1721."

    # Turkey
    TURKY: "Turkey"
    TURKY_ADJ: "Turkish"
    TURKY_desc: "Turkey is a transcontinental country in Western Asia and Southeastern Europe, officially known as the Republic of Turkey. It is a republic with a mixed economy, a secular state with a predominantly Muslim population, and its capital is Ankara, while its largest city is Istanbul. The nation is renowned for its unique geography bridging two continents, rich history as the successor to the Ottoman Empire, diverse culture, and varied landscapes from mountains to coastal areas"

    # United Kingdom
    UKKDM: "United Kingdom"
    UKKDM_ADJ: "British"
    UKKDM_desc: "The United Kingdom is a sovereign island nation in northwestern Europe consisting of the countries of England, Scotland, Wales, and Northern Ireland. It is a parliamentary democracy and constitutional monarchy with a total area of approximately 93,630 square miles (242,500 square kilometers) and a population of over 67 million people. Its capital city is London."

    # Wendish Empire
    WNDEM: "Wendish Empire"
    WNDEM_ADJ: "Wendish"
    WNDEM_desc: "'Wends' is a historical name for Slavs who inhabited present-day northeast Germany. It refers not to a homogeneous people, but to various people, tribes or groups depending on where and when it was used."

    # Armenian Empire
    AMNAE: "Armenian Empire"
    AMNAE_ADJ: "Armenian"
    AMNAE_desc: "he Armenian Empire, also known as the Kingdom of Greater Armenia, was a large, ancient kingdom that existed from 331 BC to 428 AD. Its most famous period was under Tigranes the Great, who expanded its territory to include parts of the Caucasus, Turkey, Syria, and Lebanon, stretching from the Caspian to the Mediterranean Sea. The empire was characterized by successive royal dynasties (Orontid, Artaxiad, and Arsacid), the adoption of Christianity around 301 AD, and a powerful military, especially its cavalry"

    # Arabian Empire
    ARABE: "Arabian Empire"
    ARABE_ADJ: "Arabian"
    ARABE_desc: "a historical term generally referring to the vast Islamic Caliphates ruled by Arab dynasties (specifically the Rashidun, Umayyad, and Abbasid Caliphates) that emerged from the Arabian Peninsula in the 7th century CE. At its peak, it was one of the largest land empires in history, characterized by its rapid military expansion, significant cultural and scientific advancements (the Islamic Golden Age), and the widespread diffusion of the Arabic language and Islam."

    # Caucasia
    CCASA: "Caucasia"
    CCASA_ADJ: "Caucasian"
    CCASA_desc: "the Caucasus region, is a mountainous area between Eastern Europe and Western Asia, bordered by the Black and Caspian Seas, and includes parts of southern Russia, Georgia, Armenia, and Azerbaijan. It is known for its diverse ethnicities and languages, unique cultures, and stunning geography, including Europe's highest peak, Mount Elbrus. The region is strategically located and has a history as a crossroads for empires, which has influenced its rich, complex cultures and geopolitical landscape."

    CNAEM: "Empire of China"
    CNAEM_ADJ: "Chinese"
    CNAEM_desc: "the short-lived 'Hongxian Monarchy' (1915–1916) and the long-standing 'Chinese Empire' ruled by various dynasties - The Hongxian Monarchy was a failed attempt by Yuan Shikai to reinstate the monarchy after the collapse of the Qing Dynasty, while the 'Chinese Empire' is a general term for the rule of dynasties like the Qin, Han, Ming, and Qing, which spanned centuries"

    # Goguryeo
    GGURY: "Goguryeo"
    GGURY_ADJ: "Goguryeo"
    GGURY_desc: "Goguryeo was a powerful, militaristic Korean kingdom that existed from 37 BC to 668 AD, located in Manchuria and the northern Korean peninsula. It was one of the Three Kingdoms of Korea and became a dominant force in East Asia, reaching its peak in the 5th century under Kings Gwanggaeto the Great and Jangsu. The kingdom was known for its military strength, including its defeat of a massive Sui dynasty invasion, and its territorial expansion into Manchuria and parts of the Korean peninsula. It was eventually conquered by the allied forces of the Tang dynasty and the Silla kingdom."

    MNCRA: "Manchuria"
    MNCRA_ADJ: "Manchurian"
    MNCRA_desc: "Manchuria is a historical and geographical region in Northeast Asia, most commonly referring to the three northeastern provinces of modern China: Liaoning, Jilin, and Heilongjiang. Historically, it also included parts of the Russian Far East, a territory ceded to Russia in the 19th century and now known as Outer Manchuria. The region is the ancestral homeland of the Manchu people and has been a historical crossroads for various ethnic groups, including Mongols, Koreans, and Han Chinese"

    # Korea
    KOREA: "Korea"
    KOREA_ADJ: "Korean"
    KOREA_desc: "Korea is a peninsular region in East Asia, now politically divided into two nations: North Korea and South Korea, located at the 38th parallel. South Korea, officially the Republic of Korea, is a democratic republic with a strong economy, a mountainous terrain, and four distinct seasons, bordered by North Korea, the Yellow Sea, and the Sea of Japan."

    # Himalayan Empire
    HMLAY: "Empire of the Himalayas"
    HMLAY_ADJ: "Himalayan"
    HMLAY_desc: "The Himalayan Empire was a mountainous country in the Himalayas, mentioned in the Puranas. In the puranas, Himavat was its ruler and his daughter Parvati was a princess from this kingdom. The Indian epic Mahabharata doesn't mention a kingdom named Himalaya, but mentions many kingdoms in the Himalaya mountains like the Kuninda, Parvata, Nepa, Kirata, Kimpurusha, and Kinnara."

    # Afghanistan
    AFGAN: "Afghanistan"
    AFGAN_ADJ: "Afghani"
    AFGAN_desc: "Afghanistan is a landlocked, mountainous country located at the crossroads of Central and South Asia, with a diverse, multi-ethnic population and official languages of Pashto and Dari. Its geography is dominated by the Hindu Kush mountains and deserts, with fertile valleys and plains situated between them. The country's long history is marked by its strategic location on trade routes, attracting numerous invaders, and its culture is deeply influenced by Islamic values and a strong sense of personal honor, hospitality, and loyalty."

    # Islamic State (ISIS)
    ISISS: "Islamic State"
    ISISS_ADJ: "ISIS"
    ISISS_desc: "ISIS or ISIL, is a radical Sunni Muslim militant and terrorist organization that unilaterally declared itself a worldwide caliphate (an Islamic state) in June 2014. This self-proclaimed state, which is not recognized by any other nation or the international community, aimed to establish a transnational, totalitarian Islamic state governed by its extreme interpretation of Sharia law."

    # Mingrelia
    MNGRL: "Mingrelia"
    MNGRL_ADJ: "Mingrelian"
    MNGRL_desc: "The Mingrelians are a group compactly settled in the western province of Mingrelia, situated on the Black Sea coast. Prior to the conflict in Abkhazia, Mingrelians made up the overwhelming majority of the Georgian population there, particularly in Abkhazia's southernmost Gali district."

    # North Korea
    NKORA: "North Korea"
    NKORA_ADJ: "North Korean"
    NKORA_desc: "North Korea (officially the Democratic People's Republic of Korea) is a totalitarian state in East Asia, occupying the northern half of the Korean peninsula. It is a one-party state with a hereditary dictatorship, characterized by a repressive regime, severe human rights abuses, and a focus on its military and nuclear weapons programs. The government strictly controls all media and freedoms, while the economy is centrally planned and faces significant challenges."

    # South Korea
    SKORA: "South Korea"
    SKORA_ADJ: "South Korean"
    SKORA_desc: "South Korea, or the Republic of Korea, is an East Asian nation on the southern Korean Peninsula, known for its strong, export-driven economy, advanced technology sector, and dynamic culture. It is a democratic republic with a presidential system, a population of over 51 million, and a distinctive writing system called Hangeul. The country features four distinct seasons, a mountainous terrain, and is globally recognized for its popular music (K-pop), television dramas (K-dramas), and emphasis on education."

    # Omani Empire
    OMANE: "Omani Empire"
    OMANE_ADJ: "Omani"
    OMANE_desc: "The Omani Empire was a major maritime power that dominated trade routes across the Indian Ocean from the 17th to the 19th century, with its territory at its peak extending from the Persian Gulf to modern-day Pakistan and as far south as Mozambique. Unlike many land-based empires, its strength was based on a network of ports and a powerful navy, not a large army. Key aspects include its control of maritime trade, its expansion into East Africa, its multi-ethnic population, and its eventual decline due to the rise of European powers."

    # People's Republic of China (PRC)
    PRCCN: "People's Republic of China"
    PRCCN_ADJ: "Chinese"
    PRCCN_desc: "China, officially the People's Republic of China (PRC) is a country in East Asia. With a population exceeding 1.4 billion, it is the second-most populous country after India, representing 17% of the world population."

    # Republic of China (ROC)
    ROCCN: "Republic of China"
    ROCCN_ADJ: "Chinese"
    ROCCN_desc: "The Republic of China (ROC) was established on 1 January 1912 as a sovereign state in mainland China following the 1911 Revolution, which overthrew the Manchu-led Qing dynasty and ended China's imperial history. From 1927, the Kuomintang (KMT) reunified the country and initially ruled it as a one-party state with Nanjing as the national capital."

    # Philippines
    FILPN: "Philippines"
    FILPN_ADJ: "Filipino"
    FILPN_desc: "The Philippines is an archipelagic nation in Southeast Asia, known for its unique geography of over 7,000 islands, diverse culture, and history shaped by Malay, Spanish, and American influences. It is located in the western Pacific Ocean, with a capital in Manila and a government system based on the US model."

    # Philippines
    FLPNN: "Saribayan"
    FLPNN_ADJ: "Saribayan"
    FLPNN_desc: "Our archipelago has long been divided into countless barangays, each led by its own datu, each following its own customs. Yet we share common blood, common seas, and common destiny. Through trade with China, Siam, and distant lands, we have grown prosperous, but divided we remain vulnerable.\n\nNow we unite these scattered communities into Saribayan as one realm."

    # Brunei Darussalam
    BNDSM: "Brunei Darussalam"
    BNDSM_ADJ: "Brunei Darussalam"
    BNDSM_desc: "The Sultanate of Brunei once ruled the coasts of Borneo and commanded tribute from distant islands. Our fleets controlled vital trade routes, carrying camphor, spices, and precious goods across Southeast Asian seas.\n\nIslamic law and the Sultan's authority brought prosperity and stability to our realm, earning us the title Darussalam, the Abode of Peace. Foreign powers and internal conflicts diminished our dominion, but we have not forgotten our legacy. By reclaiming the territories that once bowed to Brunei, we restore the Sultanate to greatness. Our strategic position and naval strength shall make us masters of these waters once more. The Abode of Peace returns to command the respect it deserves."

    # Saudi Arabia
    SAUDI: "Saudi Arabia"
    SAUDI_ADJ: "Saudi"
    SAUDI_desc: "Saudi Arabia is a monarchy in Western Asia that covers most of the Arabian Peninsula and is the birthplace of Islam, home to its two holiest cities, Mecca and Medina. It is the largest country in the Middle East, with a large desert landscape, and is a major global oil producer with an economy heavily dependent on petroleum. The modern kingdom was founded in 1932 by Abdulaziz Al-Saud."

    # Sulawesi
    SULAW: "Sulawesi"
    SULAW_ADJ: "Sulawesian"
    SULAW_desc: "ulawesi sits centrally within the Indonesian archipelago, with its four protruding arms reaching out in all directions, creating an intriguing outline between the Celebes, Java and Banda Seas. Owing to this – no place in Sulawesi is more than 100km from the sea."

    # Taiping
    TPING: "Taiping Heavenly Kingdom"
    TPING_ADJ: "Taiping"
    TPING_desc: "The Taiping Heavenly Kingdom was a theocratic monarchy that existed from 1851–1864 in southern and central China, with its capital at Nanjing. It was led by Hong Xiuquan and aimed to overthrow the Qing dynasty through a rebellion based on a form of Christianity, common ownership of land, and radical social reforms such as abolishing foot-binding and granting women equal rights. Despite initial success in seizing major cities, the kingdom ultimately failed due to internal strife and Qing forces, ultimately collapsing in 1864"

    # Taliban
    TLBAN: "Taliban"
    TLBAN_ADJ: "Taliban"
    TLBAN_desc: "Under the Taliban, Afghanistan is a theocratic de facto state known as the Islamic Emirate of Afghanistan. The regime is characterized by a strict, hardline interpretation and enforcement of Sharia law, severe human rights violations (particularly against women and girls), and a lack of international recognition."

    # Tengoku
    TNGKU: "Tengoku"
    TNGKU_ADJ: "Tengoku"
    TNGKU_desc: "From the ashes of civil strife and foreign faith, a new dawn rises over the islands of the East. Once fractured by warlords and divided by belief, Japan has been reborn under the banner of the Cross. Tengoku “the Heavenly Kingdom” stands as a testament to divine providence, where the sword and scripture walk hand in hand. Guided by faith and sanctified rule, this realm seeks not only to unite the islands but to spread the light of Heaven across all Asia."

    # The Horde
    HORDE: "The Horde"
    HORDE_ADJ: "Horde"
    HORDE_desc: "The endless plains once thundered with the hooves of a thousand khans each claiming descent from ancient conquerors, each dreaming of dominion over the world. Now, all have fallen silent. From the Volga to the Yellow Sea, from the Siberian tundra to the Persian sands, only one banner remains: The Horde.\n\nThe steppe has been united at last, its tribes forged into a single will of iron and fire. The last khan stands as heir to the legacy of every rider who ever rode out of the steppe — Genghis, Timur, Batu, and beyond. There are no rivals left among the horse lords… only the world to conquer."

    # Tibetan Empire
    TBETE: "Empire of Tibet"
    TBETE_ADJ: "Tibetan"
    TBETE_desc: "The Tibetan Empire was a powerful, unified empire that existed from the 7th to 9th centuries, centered on the Tibetan Plateau. At its greatest extent, it stretched from parts of modern-day Afghanistan in the west to the Bay of Bengal and Yunnan in the east, and reached its peak under emperors like Songtsen Gampo, Trisong Detsen, and Ralpachen. The empire collapsed in the late 9th century due to internal conflict and secession of territories."

    # United Arab Republic
    UNARR: "United Arab Republic"
    UNARR_ADJ: "Arab"
    UNARR_desc: "he United Arab Republic (UAR) was a short-lived political union of Egypt and Syria from 1958 to 1961, driven by pan-Arab nationalism. Egypt continued to use the name 'United Arab Republic' until 1971. The union ended after a military coup in Syria, but it was part of a larger vision for Arab unity that also included a loose confederation with North Yemen."

    # Vietnam
    VTNAM: "Vietnam"
    VTNAM_ADJ: "Vietnamese"
    VTNAM_desc: "Vietnam is a long, S-shaped country in Southeast Asia bordered by China to the north and Laos and Cambodia to the west, with a long coastline along the South China Sea to the east. It is a one-party Communist state with a population of over 100 million and a diverse geography of mountains and fertile river deltas. The economy is growing rapidly, but the country faces challenges with corruption and human rights"

    # Burma
    BURMA: "Burma"
    BURMA_ADJ: "Burmese"
    BURMA_desc: "Burma, now officially known as Myanmar, is a diverse Southeast Asian country bordered by China, India, Bangladesh, Laos, and Thailand. It is the largest country in mainland Southeast Asia with a rich culture rooted in Theravada Buddhism, evident in its temples and pagodas. The nation is geographically diverse, featuring the Irrawaddy River valley, rugged highlands, and coastal areas, and its population is made up of many ethnic groups. While largely agrarian, it is also rich in natural resources"

    # Chola Empire
    CHOLA: "Empire of Chola"
    CHOLA_ADJ: "Cholan"
    CHOLA_desc: "The Chola Empire was a medieval thalassocratic (maritime) empire in southern India (c. 848–1279) known for its strong navy and overseas influence in Southeast Asia. It was characterized by a centralized government, disciplined bureaucracy, and significant advancements in art, architecture, and literature. The empire reached its peak under kings like Rajaraja Chola I, who expanded its territory and commissioned monumental structures like the Brihadisvara Temple at Thanjavur."

    # Ceylon
    CYLON: "Ceylon"
    CYLON_ADJ: "Ceylan"
    CYLON_desc: "Ceylon is the former name for the island nation of Sri Lanka, which gained independence from the British in 1948 and became a republic in 1972. It is located in the Indian Ocean, just south of India, and is a tropical island with diverse cultures, languages, and ethnicities. The legislative capital is Sri Jayawardenepura Kotte, and the administrative capital is Colombo"

    # Abyssinia
    ABYSA: "Abyssinia"
    ABYSA_ADJ: "Abyssinian"
    ABYSA_desc: "Abyssinia was the ancient and medieval name for a region in the Horn of Africa, corresponding to the northern highlands of modern-day Ethiopia and Eritrea. It was also used as a synonym for the Ethiopian Empire, a sovereign state that existed from around 1270 until 1974 and was known for its ancient Ethiopian Orthodox Christian heritage and long history of statehood. The term was commonly used by foreigners, while the people referred to themselves as Ethiopia"

    # Chad
    ACHAD: "Chad"
    ACHAD_ADJ: "Chadan"
    ACHAD_desc: "Chad is a landlocked country in north-central Africa, bordered by Libya, Sudan, the Central African Republic, Cameroon, Nigeria, and Niger. It is characterized by diverse geography, ranging from the Sahara Desert in the north to a tropical savannah in the south, with a climate that varies significantly from arid to rainy depending on the region and season. Chad is home to over 200 ethnic and linguistic groups, with French and Arabic as official languages."

    # Madagascar
    MDGSC: "Madagascar"
    MDGSC_ADJ: "Madagascaran"
    MDGSC_desc: "Madagascar is a large island nation in the Indian Ocean off the coast of Africa, known for its unique biodiversity, which evolved in isolation and includes a high percentage of species found nowhere else on Earth. The country's economy is primarily based on agriculture, with a population facing high poverty and structural challenges. Its diverse geography includes tropical coasts, temperate plateaus, and arid regions, with a semi-presidential republic as its political system."

    # Rhodesia
    RHDSA: "Rhodesia"
    RHDSA_ADJ: "Rhodesian"
    RHDSA_desc: "Rhodesia was an unrecognised country in Southern Africa from 1965 to 1979, which was the de facto successor to the British colony of Southern Rhodesia. It was characterized by a white-minority government that issued a unilateral declaration of independence (UDI) and faced internal conflict, and the territory eventually became modern-day Zimbabwe."

    # Palestine
    PLSTN: "Palestine"
    PLSTN_ADJ: "Palestinian"
    PLSTN_desc: "Generally, Palestine is used to refer to the geographic region spanning from the Mediterranean Sea in the east to the Jordan River in the west. Historical Palestine is made up of the current Palestinian territories of the Gaza Strip and the West Bank—referred to as the State of Palestine."

    # Israel
    ISREL: "Israel"
    ISREL_ADJ: "Israeli"
    ISREL_desc: "Israel is a small, modern, and highly developed parliamentary democracy located in the Middle East on the eastern shore of the Mediterranean Sea. It is defined as the world's only Jewish state, serving as the historic and cultural homeland for the Jewish people."

  ############################
  # NON-HISTORICAL FORMABLES #
  ############################

    # Sardinia-Piedmont
    SDPDM: "Sardinia-Piedmont"
    SDPDM_ADJ: "Sardinian-Piedmontese"
    SDPDM_desc: "Sardinia-Piedmont was a powerful Italian state ruled by the House of Savoy, uniting the island of Sardinia with the mainland territories of Piedmont after 1720, becoming a key player in Italian unification (Risorgimento) under Victor Emmanuel II, culminating in it becoming the foundation for the unified Kingdom of Italy in 1861, despite French interruptions and wars with Austria."

    # North Italian Confederation
    NITAC: "North Italian Confederation"
    NITAC_ADJ: "North Italian"
    NITAC_desc: "The 'North Italian Confederation' generally refers to hypothetical or historical alternative scenarios rather than a single, long-standing historical state. In actual history, northern Italy was a collection of various independent states, city-states, and territories under foreign control (notably Austrian) before the unification of Italy in 1861."

    # South Italian Confederation
    SITAC: "South Italian Confederation"
    SITAC_ADJ: "South Italian"
    SITAC_desc: "The 'South Italian Confederation' generally refers to hypothetical or historical alternative scenarios rather than a single, long-standing historical state. In actual history, southern Italy was a collection of various independent states, city-states, and territories under foreign control (notably Austrian) before the unification of Italy in 1861."

    # Mexico
    MEXCO: "Mexico"
    MEXCO_ADJ: "Mexican"
    MEXCO_desc: "From the deserts of the north to the jungles of the south, from the shores of two great oceans to the highlands of the interior, these lands have witnessed the rise and fall of mighty civilizations. The legacy of the Mexica, the Maya, and countless other peoples runs deep in this earth.\n\nBy uniting the diverse peoples and territories of this vast region, we forge México - a nation rich in silver, abundant in crops, and unmatched in cultural heritage. Here, ancient cities stand beside colonial settlements, and the wealth of the land flows through our hands. Let all powers recognize that México stands as master of its own destiny, a sovereign realm worthy of respect and fear."

    # Oklahoma
    OKLAH: "Oklahoma"
    OKLAH_ADJ: "Oklahoman"
    OKLAH_desc: "The lands between the Red River and the Arkansas span prairies, woodlands, and hills - home to the Caddo, Wichita, Osage, and numerous other peoples. These territories stand at the crossroads of competing powers, yet offer rich soil, abundant game, and strategic river valleys.\n\nBy uniting the settlements and tribes of this region, we forge a nation that controls vital trade routes between the Great Plains and the forested East. Oklahoma - named for the Choctaw words meaning 'red people' - shall stand as a sovereign power, drawing strength from the diversity of its inhabitants and the wealth of its land."

