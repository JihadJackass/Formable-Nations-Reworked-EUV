    # Hungary-Romania
    HNRMN_f: "Hungary-Romania"
    HNRMN: "Hungary-Romania"
    HNRMN_ADJ: "Hungary-Romanian"
    HNRMN_desc: ""

    # Camelot
    CMLOT: "Camelot"
    CMLOT_ADJ: "Camelot"
    CMLOT_desc: "Camelot refers to the legendary court of King Arthur, a symbol of a just and utopian kingdom built around the Knights of the Round Table\n\nThe story often focuses on the ideals of Camelot being threatened by the love triangle between Queen Guenevere and Sir Lancelot, and the treachery of Arthur's illegitimate son, Mordred. Ultimately, the conflict leads to the downfall of Arthur's dream of a perfect kingdom, though the legend endures as a symbol of greatness and an idealized time."

    # Galicia-Lodomeria
    GLD_f: "Galicia-Lodomeria"
    GLCLD: "Galicia-Lodomeria"
    GLCLD_ADJ: "Galician-Lodomerian"
    GLCLD_desc: "The Kingdom of Galicia and Lodomeria was a large crown land of the Habsburg Monarchy, created from Polish-Lithuanian Commonwealth lands after the First Partition of Poland in 1772, encompassing modern-day western Ukraine and parts of southern Poland. It served as a major Austrian province, incorporating Ruthenian (Ukrainian) and Polish territories, with Lviv (Lemberg) as its capital, and existed until the dissolution of Austria-Hungary after World War I in 1918, after which its territories were divided between Poland and Ukraine."

    # Gran Columbia
    GCOLM: "Gran Columbia"
    GCOLM_ADJ: "Gran Columbian"
    GCOLM_desc: "Gran Colombia (1819-1831) was a short-lived South American republic created by Simón Bolívar, uniting modern-day Colombia, Panama, Venezuela, and Ecuador, plus parts of Peru and Brazil, to form a powerful unified state. Despite ambitious goals for Latin American unity, it was plagued by political instability, regional rivalries (centralists vs. federalists), and internal conflicts, leading to its dissolution into separate nations (Venezuela, Ecuador, and New Granada - the precursor to modern Colombia) by 1831, with Panama later separating from New Granada."

    # Elbian Federation
    ELBNF: "Elbian Federation"
    ELBNF_ADJ: "Elbian"
    ELBNF_desc: "From the headwaters of the Krkonoše Mountains to the bustling ports of Hamburg, the Elbe has long been Central Europe's commercial artery. The Elbian Federation unites the merchant princes of Saxony, the industrial cities of Bohemia, and the Hanseatic traditions of the North under a federal charter that prioritizes trade, cultural autonomy, and shared prosperity over military domination.\n\nNeither wholly German nor purely Slavic, the Federation embraces its multicultural identity. German burghers, Czech craftsmen, and Sorbian farmers coexist under a constitution guaranteeing linguistic and religious freedoms. The capital of either [ShowLocationName('dresden')] or [ShowLocationName('prague')] - #color_yellow depending on the choice upon formation#! - which serves as the federal capital, a baroque jewel at the crossroads of European culture.\n\nEconomically powerful but militarily cautious, the Elbian Federation seeks to be Europe's Switzerland: a neutral arbiter and financial center, enriched by river trade, mining, and advanced manufacturing. Where Prussia offers the sword and Austria the crown, Elbian offers the ledger and the loom."

    # Great Moravia
    GMORV: "Great Moravia"
    GMORV_ADJ: "Moravian"
    GMORV_desc: "Great Moravia was a significant West Slavic state in Central Europe from roughly 833 to 907, with its heartland in modern-day Czech Republic and Slovakia. It was a major hub for the Christianization of the Slavs, notable for the missionary work of Cyril and Methodius, and laid the foundation for future Slavic literature and culture. At its peak under ruler Svatopluk I, it was a powerful state that acted as a buffer between the Frankish Empire and nomadic tribes. Its decline was triggered by internal conflicts and invasions, notably from the Magyars"

    # Gothia
    GOTIA: "Gothia"
    GOTIA_ADJ: "Gothian"
    GOTIA_desc: "Historically, 'Gothia' referred to various territories settled and ruled by the Germanic Goth people in the Roman and Late Antique periods. These regions included areas north of the lower Danube in modern Romania, Moldova, and Ukraine, as well as a Roman province in the 4th century AD."

    # Alaska
    ALSKA: "Alaska"
    ALSKA_ADJ: "Alaskan"
    ALSKA_desc: "Alaska is the 'Last Frontier,' a vast and diverse US state known for its dramatic landscapes, rich wilderness, and vibrant Alaska Native cultures. Its geography includes everything from arctic tundra to coastal rainforests, with abundant wildlife and natural phenomena like the Northern Lights."

    # Arpitania
    ARPIT: "Arpitania"
    ARPIT_ADJ: "Arpitanian"
    ARPIT_desc: "Arpitania is a cultural and linguistic region in the Western Alps, encompassing parts of France, Switzerland, and Italy, and is defined by the use of the Arpitan language (also called Franco-Provençal). It was historically centered on the Duchy of Savoy but has never been a single political entity. Key Arpitan areas include the French departments of Ain, Savoie, and Haute-Savoie, the Swiss region of Romandy, and the Italian Aosta Valley."

    # Adriatic Empire
    ADREM: "Adriatic Empire"
    ADREM_ADJ: "Adriatic"
    ADREM_desc: "Born from trade, tempered by war, and bound together by the tides, the Adriatic Empire rules the waters that once divided it. From Venice to Ragusa, from the Istrian coast to the Dalmatian isles, merchants and admirals alike have woven a realm of gold and salt, commerce and conquest. The Empire thrives not through sheer might, but through mastery of the sea."

    ALPLN: "Alpland"
    ALPLN_ADJ: "Alplands"
    ALPLN_desc: "mong the clouds and crags of the great mountains, a new power has taken root. Forged from the hardy peoples of the Alps — shepherds, merchants, warriors, and republics alike — Alpland stands as a bastion of unity amid stone and snow. Where others see only cold and peril, the Alplanders see strength, freedom, and opportunity. Their passes channel the wealth of Europe; their peaks guard against invasion.\n\nNeither empire nor mere federation, Alpland is a nation of the heights — resilient, disciplined, and eternally watchful."

    ANDUH: "Anglo-Dutch Union"
    ANDUH_ADJ: "Anglo-Dutch"
    ANDUH_desc: "The Anglo-Dutch Union was a personal union between Great Britain and the Netherlands, lasting from 1692 to 1712 under monarch William III. It was a period where the same king ruled both countries, leading to a powerful maritime alliance and shared colonial empires, with London and The Hague serving as de facto capitals. This union ended after William III's death in 1712, when the two entities were separated, though the Palatinate and the Netherlands remained in a separate personal union until 1744"

    # Great Scotia
    GSCTL: "Great Scotia"
    GSCTL_ADJ: "Scottish"
    GSCTL_desc: "For centuries, Scotland endured as the defiant northern kingdom, bloodied but unbowed. No longer content with mere survival, the time has come for Scotland to claim its place as a great power.\n\nGreat Scotia unites the Lowlands and Highlands under one crown and extends Scottish governance across the Celtic lands, contested borderlands, and overseas territories. From Edinburgh to the Clyde shipyards, from Shetland to Ulster, the Scottish nation expands.\n\nOur Presbyterian Kirk provides moral foundation, our universities produce Europe's finest minds, and our regiments have proven themselves on every battlefield. The Scots have long punched above their weight. Now we shall have the weight to match.\n\nScotland is no longer the northern periphery. We are Great Scotia, and we bow to no one."

    # Austro-Hungarian Empire
    ASHNG: "Austro-Hungarian Empire"
    ASHNG_ADJ: "Austro-Hungarian"
    ASHNG_desc: "The Austro-Hungarian Empire (1867-1918) was a dual monarchy in Central Europe, uniting the Austrian Empire and the Kingdom of Hungary under a single Habsburg monarch, Emperor Franz Joseph. Formed by the 1867 Compromise (Ausgleich), it featured separate governments for Austria and Hungary but shared foreign policy, military, and finance, managing a diverse collection of ethnicities. A major power, its internal ethnic tensions and nationalism, exacerbated by World War I, ultimately led to its collapse and dissolution into new nations by 1918."

    ASHNG_NAME_SHORT: "Austria-Hungary"
    ASHNG_NAME_SHORT_ADJ: "Austro-Hungarian"

    ASHNG_NAME_LONG: "Austro-Hungarian Empire"
    ASHNG_NAME_LONG_ADJ: "Austro-Hungarian"

    # Austrian Empire
    AUSEM: "Austrian Empire"
    AUSEM_ADJ: "Austrian"
    AUSEM_desc: "The Austrian Empire was a multinational European great power from 1804 to 1867, which was ruled by the Habsburgs and became the basis for the later Austro-Hungarian Empire. It was a large, diverse country with various ethnic groups and languages, but it struggled with internal nationalistic tensions. In 1867, the empire was restructured into the Dual Monarchy of Austria-Hungary, where Hungary gained more autonomy, though a single monarch still ruled both states. "

    ASTBV: "Austria-Bavaria"
    ASTBV_ADJ: "Austro-Bavarian"
    ASTBV_desc: "Austria and Bavaria — long divided by pride, faith, and ambition now stand united at the heart of Europe. This new realm blends the imperial tradition of Vienna with the cultural vigor of Munich, commanding the gateways between Italy and Germany, East and West."

    BLKLG: "Balkan League"
    BLKLG_ADJ: "Balkan"
    BLKLG_desc: "The Balkan League was a military alliance of Bulgaria, Serbia, Greece, and Montenegro, formed in 1912 with the goal of driving the Ottoman Empire out of southeastern Europe and gaining territory. While initially successful in the First Balkan War, the alliance quickly disintegrated over disputes about how to divide the captured lands, which led to the Second Balkan War in 1913"

    BASQU: "Basque Country"
    BASQU_ADJ: "Basque"
    BASQU_desc: "The Basque Country consists of seven provinces that stretch from the Pyrenees to the Bay of Biscay in the country's north, plus a small area reaching into southwestern France. In Spanish, it's known as País Vasco; in Euskara—the ancient Basque language that predates Greek and Latin — Eusakadi."

    # bosnia serbia
    BSSER: "Bosnia-Serbia"
    BSSER_ADJ: "Bosno-Serbian"
    BSSER_desc: "Bosnia and Serbia now stand united — a bastion of Slavic strength in the heart of the Balkans.\n\nThis new kingdom inherits the resilience of Bosnia and the martial legacy of Serbia, blending western and eastern traditions into a single, unyielding state. Together, they guard the crossroads of empires and carve their own destiny amid the shifting powers of the continent."

    # Catholica Russica
    CATRU: "Catholica Russica"
    CATRU_ADJ: "Catholica Russican"
    CATRU_desc: "'Catholica Russica' (or Russian Catholic) refers to the Russian Greek Catholic Church, a small, self-governing (sui iuris) Eastern Catholic particular church that is in full communion with the Pope and the worldwide Catholic Church."

    # Celtic Union
    CTUNN: "Celtic Union"
    CTUNN_ADJ: "Celtic"
    CTUNN_desc: "A 'Celtic Union' is a hypothetical or fictional political entity that would unite the modern Celtic nations. In these fictional descriptions, it often includes Scotland, Ireland, Wales, the Isle of Man, Cornwall, and Brittany, sometimes with other regions claiming Celtic heritage like Galicia. These concepts vary widely but generally focus on uniting these areas for economic, cultural, or political reasons, though their real-world implementation is complex and unsupported by the majority of the public in the regions involved."

    # Carolingian Empire
    CAROL: "Carolingian Empire"
    CAROL_ADJ: "Carolingian"
    CAROL_desc: "The Carolingian Empire was a Frankish-dominated state in Western and Central Europe from 800 to 888 CE, founded by Charlemagne who was crowned emperor by the Pope. It was the most powerful empire in Western Europe for its time, stretching from Spain to modern-day Germany, and served as a predecessor to the Holy Roman Empire and the modern states of France and Germany."

    # Cordoba
    CDOBA: "Cordoba"
    CDOBA_ADJ: "Cordoban"
    CDOBA_desc: "The Caliphate of Córdoba was an Islamic state centered in Córdoba, Spain, that existed from 929 to 1031 CE. It was the peak of Muslim rule in the Iberian Peninsula (known as al-Andalus), a period of great cultural, scientific, and architectural advancement, considered the 'golden age' of Muslim Spain. At its height, the caliphate was a prosperous and advanced urban civilization with a sophisticated economy and a capital city that was the largest and most important in Western Europe."

    # Dacia
    DACIA: "Dacia"
    DACIA_ADJ: "Dacian"
    DACIA_desc: "Dacia was an ancient kingdom located in what is now modern-day Romania, known for its wealthy gold mines and skilled warriors who clashed with the Roman Empire. It was home to the Dacians, a people of Thracian stock, who were eventually conquered by Emperor Trajan and became a Roman province in the early 2nd century AD. The Romans ruled for about 170 years before withdrawing in 271 AD, leaving a lasting cultural and historical legacy in the region."

    # Serene Republic of Australia
    SROAU: "Serene Republic of Australia"
    SROAU_ADJ: "Australian"
    SROAU_desc: "TThe southern continent, long isolated from global trade, now stands united under merchant rule. From harbors spanning Australia to New Zealand, our fleets dominate Pacific and Indian Ocean trade routes, carrying wool, minerals, and exotic goods to distant markets.\n\nUnlike feudal kingdoms elsewhere, our republic is governed by merchant princes elected from great trading houses. Political power flows from wealth, ensuring policy serves commerce rather than dynasty. Our strategic isolation protects us from foreign armies while our scattered ports create a fortified network across the Pacific.\n\nWe are merchants before warriors, preferring profit to conquest. Yet our armed merchant marines and private garrison forces defend commercial interests when necessary. Let others fight for thrones. We have built an empire on trade alone.ODO"

    # Dual Monarchy
    DLMON: "Dual Monarchy"
    DLMON_ADJ: "Anglois"
    DLMON_desc: "The dual monarchy of England and France was a period from 1422 to 1453 where the infant King Henry VI of England was recognized as the monarch of both England and France, though his claim was disputed. It was established by the Treaty of Troyes following Henry V's invasion and English control of northern France during the Hundred Years' War. The claim was contested by the Dauphin Charles, who controlled southern France, and it ended when the French, led by Charles VII, gradually expelled the English from all territories except Calais."

    # East Slavia
    ESLAV: "East Slavia"
    ESLAV_ADJ: "East Slavian"
    ESLAV_desc: "A hypothetical nation and a real-world group of people. As a fictional nation, it is a unitary republic with a capital in Kiev, languages including Ukrainian, Belarusian, and Russian, and a population of about 54 million. The real-world East Slavs are a subgroup of Slavs, comprising the Belarusians, Russians, and Ukrainians, who speak East Slavic languages."

    # Franco-Iberian Empire
    FNCIB: "Franco-Iberian Empire"
    FNCIB_ADJ: "Franco-Iberian"
    FNCIB_desc: "in 1579, France and Spain were allied to form the Franco-Iberian Empire as known as The Three Crowns (Spain, France and Portugal) and The colonization Had started into New viceroyalities by Three languages (Portuguese, Spanish and French), and colonies have merged Together into a new empire, the Franco-Iberia, in 1732 The United Kingdom of Great Britain and Ireland have become a dual monarchy with Scottish Queen as The United Kingdom of England, Scotland and Ireland, in 1776 The Mexican Revolutionary War and American Revolutionary War has started and ended in 1778. "

    # Babylon
    BBLON: "Babylon"
    BBLON_ADJ: "Babylon"
    BBLON_desc: "Babylon"

    # Assyria
    ASYRI: "Assyria"
    ASYRI_ADJ: "Assyrian"
    ASYRI_desc: "Assyria was a major Mesopotamian kingdom and one of the earliest great empires in the ancient Middle East, located in what is now northern Iraq and southeastern Turkey. It is also the name for the homeland of the Assyrian people, a region within Upper Mesopotamia that is now divided between present-day Iraq, Turkey, Iran, and Syria. The empire, known for its military might and large territory that stretched from the Persian Gulf to the Mediterranean Sea between 900 and 600 BC, took its name from its first capital city, Ashur."

    # Assyrian Empire
    ASYRE: "Assyrian Empire"
    ASYRE_ADJ: "Assyrian"
    ASYRE_desc: "From the ancient city of #color_yellow Ashur#! on the Tigris, the #color_yellow Assyrian Empire#! once dominated the Near East through military might and administrative genius. At its height under kings like #color_yellow Ashurbanipal#! and #color_yellow Sennacherib#!, Assyrian armies marched from the mountains of #color_yellow Anatolia#! to the deserts of #color_yellow Egypt#!, from the Mediterranean coast to the #color_yellow Persian highlands#!. The great capital of #color_yellow Nineveh#! housed the world's first systematically organized library, while Assyrian governors ruled distant provinces through an intricate network of roads, messengers, and garrisons. Though the empire fell to the combined forces of #color_yellow Babylon#! and #color_yellow Media#! in 612 BCE, its legacy endures in the ruins of palaces and the memory of peoples across these lands. By reuniting the territories once governed from #color_yellow Nineveh#! and #color_yellow Ashur#!, we do not merely conquer cities and provinces. We resurrect an empire that brought law, learning, and order to the civilized world. The Akkadian tongue of our ancestors shall be honored, and the name of #color_yellow Assyria#! shall strike fear into our enemies once more."

    HPBRA: "Hyperborea"
    HPBRA_ADJ: "Hyperborean"
    HPBRA_desc: "Hyperborea is a legendary land from Greek mythology, envisioned as a perfect, sun-blessed utopia in the far North where people lived long and happy lives, beyond the reach of the North Wind (Boreas)."

    # Frieslande
    FIESL: "Frieslande"
    FIESL_ADJ: "Frieslande"
    FIESL_desc: "Friesland is a province in the northern Netherlands known for its unique culture, distinct language (West Frisian), and strong connection to its history as a seafaring people. It is characterized by flat, low-lying polders, numerous lakes, canals, and a strong agricultural sector, especially dairy farming."

    # Gallic Empire
    GLCEM: "Gallic Empire"
    GLCEM_ADJ: "Gallic"
    GLCEM_desc: "The Gallic Empire was a breakaway part of the Roman Empire that existed from 260 to 274 AD, during the Crisis of the Third Century. It was established by the Roman commander Postumus and included the territories of Gaul, Britannia, and Hispania. The empire had its own government and mint."

    # Tarraconensis
    TRCNS: "Tarraconensis"
    TRCNS_ADJ: "Tarraconensis"
    TRCNS_desc: "TODO"

    # Britannia
    BRTNA: "Britannia"
    BRTNA_ADJ: "Britannian"
    BRTNA_desc: "TODO"

    # Kingdom of Jerusalem
    JRSLM: "Kingdom of Jerusalem"
    JRSLM_ADJ: "Jerusalemite"
    JRSLM_desc: "TODO"

    # Beta Israel
    BISRA: "Beta Israel"
    BISRA_ADJ: "Beta Israeli"
    BISRA_desc: "TODO"

    # Hungarian Empire
    HNGEM: "Hungarian Empire"
    HNGEM_ADJ: "Hungarian"
    HUNGARIANEMPIRE_desc: "The Hungarians once stood as the principal nation of Europe and held potential for Great Power status but were devastated by the Bubonic Plague, and the subjugated by the Austrians leading to the Austro-Hungarian Union.\n\nSuch a fate is unacceptable to the historical Magyar Realm and with the right determination we can establish an Empire of Hungarians for Hungarians."

    # Iberian Empire
    IBNEM: "Iberian Union"
    IBNEM_ADJ: "Iberian"
    IBNEM_desc: "The Iberian Union describes the period from 1580 to 1640 in which the Monarchy of Spain under the Habsburg dynasty, then the personal union of the crowns of Castile and Aragon, brought in personal union also the Kingdom of Portugal. It incorporated the entire Iberian Peninsula except Andorra."

    # Italian Merchant Alliance
    ITMCH: "Italian Merchant Alliance"
    ITMCH_ADJ: "Italian"
    ITMCH_desc: "he maritime republics also called merchant republics were Italian thalassocratic port cities which, starting from the Middle Ages, enjoyed political autonomy and economic prosperity brought about by their maritime activities. The term, coined during the 19th century, generally refers to four Italian cities, whose coats of arms have been shown since 1947 on the flags of the Italian Navy and the Italian Merchant Navy\n\nIf we manage to Unite the republics into a single entity we can establish one of the strongest trade empires in history."

    # Federal Republic of Central America
    FROCA: "Federal Republic of Central America"
    FROCA_ADJ: "Central American"
    FROCA_desc: "TODO"

    # Jagiellonian Empire
    JGLNN: "Jagiellonian Empire"
    JGLNN_ADJ: "Jagiellonian"
    JGLNN_desc: "The 'Jagiellonian Empire' refers to the vast territories ruled by the Jagiellonian dynasty between the 14th and 16th centuries, which included the Kingdom of Poland, the Grand Duchy of Lithuania, and at times, the Kingdoms of Hungary and Bohemia. While not a single empire with one emperor, the personal union between Poland and Lithuania grew into the Polish–Lithuanian Commonwealth and is sometimes considered an empire due to its immense size and influence, ruling over modern-day Poland, Lithuania, Belarus, and western Ukraine."

    # Kyivan Rus
    KYVRU: "Kyivan Rus"
    KYVRU_ADJ: "Kyivan"
    KYVRU_desc: "Kyivan Rus' was a medieval state in Eastern Europe, established by Norse (Varangian) settlers who unified East Slavic tribes and ruled from the city of Kyiv, from the late 9th to the mid-13th century. It was a confederation of principalities that grew wealthy from trade routes, and at its peak, it stretched from the Baltic to the Black Sea and the Carpathian to the Volga rivers."

    # Umayyads
    UMAYA: "Umayyad Caliphate"
    UMAYA_ADJ: "Umayyad"
    UMAYA_desc: "The Umayyad Caliphate (661–750 CE) was the first major Islamic dynasty, transforming the Muslim community into a vast, centralized Arab-Islamic empire. Ruled from its capital in Damascus, Syria, it became one of the largest unitary states in history, stretching from the Iberian Peninsula (Spain and Portugal) in the west to India and Central Asia in the east."

    # Rashidun Caliphate
    RSHDN: "Rashidun Caliphate"
    RSHDN_ADJ: "Rashidun"
    RSHDN_desc: "The Rashidun Caliphate, meaning 'Rightly Guided,' was the early Islamic empire that existed from 632 to 661 CE, led by the first four caliphs: Abu Bakr, Umar, Uthman, and Ali. It was a period of rapid territorial expansion across the Middle East, North Africa, and the Arabian Peninsula, built on a foundation of swift military victories. The caliphate also established crucial administrative, legal, and military institutions that shaped the future of Islamic states."

    FTMID: "Fatimid Caliphate"
    FTMID_ADJ: "Fatimid Caliphate"
    FTMID_desc: "The Fatimid Caliphate was a medieval Islamic dynasty that ruled parts of North Africa and the Middle East from 909 to 1171 CE, with its capital later moved to Cairo, Egypt. As followers of the Isma'ili Shia Islam branch, they claimed descent from the Prophet Muhammad's daughter, Fatima, and challenged the Sunni Abbasid Caliphate for leadership of the Muslim world. They were known for their advanced urban planning in Cairo, religious tolerance, and contributions to scholarship and trade."

    # Abbasid Caliphate
    ABSID: "Abbasid Caliphate"
    ABSID_ADJ: "Abbasid"
    ABSID_desc: "The Abbasid Caliphate was a powerful Islamic dynasty that ruled from 750 to 1258 CE, succeeding the Umayyad Caliphate. It is best known for overseeing the Islamic Golden Age, marked by significant cultural, scientific, and intellectual advancements, and for establishing Baghdad as its capital. Though its power waned and parts of the empire broke away, the caliphate maintained spiritual authority until it was destroyed by the Mongol invasion in 1258. "

    # East Francia
    KOGER: "East Francia"
    KOGER_ADJ: "East Francian"
    KOGER_desc: "East Francia, otherwise known as the 'Kingdom of Germany' is the eastern part of the Carolingian Empire that was established after the Treaty of Verdun. It was primarily Germanic-speaking and was ruled by the Carolingian dynasty until 911, after which it became an elective monarchy before eventually developing into the Holy Roman Empire"

    # Kingdom of God
    KOGOD: "Kingdom of God"
    KOGOD_ADJ: "Heavenly"
    KOGOD_desc: "The Kingdom of God is primarily described as the dynamic reign, rule, and authority of God rather than a physical, geographical nation state in the current age. It is both a present spiritual reality experienced by believers and a future physical reality that will be fully established on Earth at the second coming of Jesus Christ"

    # Langobards
    LNGBD: "Langobards"
    LNGBD_ADJ: "Langobard"
    LNGBD_desc: "The Lombards, Longobards or Langobards (Latin: Langobardi) were a Germanic people who conquered most of the Italian Peninsula between 568 and 774."

    # Lusitanian Empire
    LUSIT: "Lusitanian Empire"
    LUSIT_ADJ: "Lusitanian"
    LUSIT_desc: "The Lusitanians were an Indo-European-speaking people living in the far west of the Iberian Peninsula, in present-day central Portugal and the regions of Extremadura and Castilla y León of Spain. It is uncertain whether the Lusitanians were Celts or Celticized Iberians, related to the Lusones."

    # Macedon
    MACED: "Macedon"
    MACED_ADJ: "Macedonian"
    MACED_desc: "TODO: content, description, color & flag + anything else it needs"

    # Macedonian Empire
    MCDEM: "Macedonian Empire"
    MCDEM_ADJ: "Macedonian"
    MCDEM_desc: "The boundaries of the region have changed over time. The ancient Kingdom of Macedon, famous for figures like Alexander the Great, was a dominant power in the region before its fragmentation after the Roman Empire's decline."

    # North Sea Empire
    NOSEM: "North Sea Empire"
    NOSEM_ADJ: "Anglo-Scandinavian"
    NOSEM_desc: "The North Sea Empire was a historical personal union of England, Denmark, and Norway from 1013 to 1042, ruled by Norse kings like Sweyn Forkbeard and Cnut the Great. It was a thalassocracy, dependent on the sea for connection and unity. The empire was a product of the late Viking Age and was a personal union rather than a single, unified state, with each territory maintaining its own autonomy and laws"

    # Occitania
    OCCIT: "Occitania"
    OCCIT_ADJ: "Occitanian"
    OCCIT_desc: "a historical and cultural region in southwestern Europe, defined by the historical use of the Occitan language. It spans much of southern France, plus parts of Spain (Aran Valley), Monaco, and Italy (Occitan Valleys). Today, a French administrative region is named 'Occitanie' after this historical area, but it does not represent the entirety of the traditional Occitan lands."

    # Pontus
    PONTU: "Pontus"
    PONTU_ADJ: "Pontic"
    PONTU_desc: "Pontus was a Hellenistic kingdom centered in the historical region of Pontus in modern-day Turkey, and ruled by the Mithridatic dynasty of Persian origin, which may have been directly related to Darius the Great of the Achaemenid dynasty. The kingdom was proclaimed by Mithridates I in 281 BC and lasted until its conquest by the Roman Republic in 63 BC. The Kingdom of Pontus reached its greatest extent under Mithridates VI the Great, who conquered Colchis, Cappadocia, Bithynia, the Greek colonies of the Tauric Chersonesos, and for a brief time the Roman province of Asia. After a long struggle with Rome in the Mithridatic Wars, Pontus was defeated."


