  # Law Localization

    # Policies

    # Adminstrative

      # Legal Code

        # Great Moravia

        sudnyj_ludem_policy: "Sudnyj Ludem"
        sudnyj_ludem_policy_desc: "Written by Saints Cyril and Methodius, the Zakon Sudnyj Ljudem consisted of 32 chapters providing legal guidance to our ancestors. While archaic by modern standards, this foundational text can be expanded and adapted to create a unified legal code for common folk, replacing the patchwork of local customs that currently govern our realm.\n\nWe shall bestow judicial authority upon our nobles, allowing them to dispense justice in their territories. However, to prevent abuse and ensure consistent application of law, royal legal overseers will serve alongside noble judges as co-judiciary. These crown representatives shall monitor proceedings, hear appeals, and report abuses directly to the throne. Thus justice becomes both decentralized and accountable, combining local knowledge with royal oversight."

    # Military

      # Army Doctrine

        # Great Moravia
        gmorv_professional_army_policy: "Professional Armies of Moravia"
        gmorv_professional_army_policy_desc: "We field neither the largest armies nor the finest individual soldiers, cavalry, or artillery. Our strength lies elsewhere: rigorous standards applied universally. Every soldier trains thoroughly, every unit maintains strict discipline, every commander follows proven doctrine. While enemies mix elite troops with untrained levies, we ensure consistent competence across all ranks. Our weakest battalion matches their average quality. Superior baseline standards transform adequate forces into reliable instruments of war. Consistency defeats brilliance. Discipline outlasts excellence."
