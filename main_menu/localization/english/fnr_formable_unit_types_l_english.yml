l_english:

  # UNIT TYPES

    fnr_stahlwagen: "Stahlwagen"
    fnr_stahlwagen_desc: "During the Hussite Wars, the Hussite army consisted mainly of peasants, yet they were able to defeat even fabled knights on horseback through their use of wagon forts and early firearms. We have come to the same conclusion: these wagon forts can be useful. But unlike theirs, ours are custom-made for war, armored in steel and constructed to accommodate matchlock firearms and pikes. They will serve as our shield."

    fnr_druzhina: "Druzhina"
    fnr_druzhina_desc: "The Druzhina were elite warrior retinues maintained by princes and nobles in old Slavic tradition. These professional soldiers, paid by their lords, served as both bodyguards and shock troops. Arab traveler Ibrahim ibn Yakub witnessed Poland's Duke commanding 3,000 such warriors. Nobles may now raise these traditional forces - at their own cost, sworn to the Crown."


