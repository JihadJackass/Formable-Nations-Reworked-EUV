l_english:

  # HEIR SELECTION LOCALIZATION

      # Great Moravia
      moravian_meritocratic_succession: "Moravian Meritocratic Succession"  
      moravian_meritocratic_succession_desc: "When Svätopluk I died, his three sons divided Great Moravia, leading to its destruction. We shall not repeat this mistake. Both male and female heirs may inherit, all educated in Nitra by the realm's finest scholars. Merit determines succession, ensuring the most capable rule. Yet family unity remains sacred: talented relatives shall serve in administration, preventing the destructive ambitions that once tore our realm apart."  


