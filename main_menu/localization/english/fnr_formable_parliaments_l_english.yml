  country_flavor_parliament_state_duma_desc: "The State Duma, which was created in 1905 after the Russian Revolution of 1905. Before this, the empire operated as an absolute monarchy without a national parliament. The State Duma was the lower house of the parliament, with the upper house being the State Council."

